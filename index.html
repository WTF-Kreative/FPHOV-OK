<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPHOV - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #111827; 
            background-image: url('bandit-background.jpg');
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f3f4f6;
            position: relative;
        }
        
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(17, 24, 39, 0.85); z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(31, 41, 55, 0.95);
            border: 1px solid #374151;
            padding: 2.5rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        .login-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(to right, #991b1b, #ffffff, #1e3a8a);
            border-radius: 1rem 1rem 0 0;
        }

        .logo {
            width: 80px;
            height: auto;
            margin-bottom: 1rem;
        }

        <h2> {
            font-size: 1.25rem;
            font-weight: 700;
            color: #f3f4f6;
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 1.25rem;
            text-align: left;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            background: #1f2937;
            border: 1px solid #4b5563;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* Show/Hide Password Toggle Layout */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 2.75rem; /* Make room for the text button */
        }

        .toggle-password-btn {
            position: absolute;
            right: 0.75rem;
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            user-select: none;
            transition: color 0.2s;
        }

        .toggle-password-btn:hover {
            color: #3b82f6;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background-color: #1e3a8a;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background-color: #dc2626;
            transform: translateY(-1px);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.5rem;
            border-radius: 0.25rem;
        }
        
        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #6b7280;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="fphov-logo.png" alt="FPHOV Logo" class="logo">
        
        <h2>FPHOV Waiting List<br>Dashboard</h2>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="username">User</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
                    <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility()">Show</button>
                </div>
            </div>

            <button type="submit" class="btn-login">SECURE LOGIN</button>
            
            <div id="errorMsg" class="error-msg">Incorrect credentials. Access denied.</div>
        </form>

        <p class="footer-text">Authorized Personnel Only</p>
    </div>

    <script>
        // Feature Added: Toggles the password field mask properties dynamically
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password-btn');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = 'Show';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const card = document.querySelector('.login-card');

            errorMsg.style.display = 'none';

            try {
                // Hits the Cloudflare back-end engine processing edge node
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });

                if (response.ok) {
                    // Success: Cookie is stored in the pipeline browser session cache
                    window.location.href = "dashboard-vets.html";
                } else {
                    // Error: Run layout warning and card shake
                    errorMsg.textContent = "Incorrect credentials. Access denied.";
                    errorMsg.style.display = 'block';
                    card.style.animation = 'shake 0.5s';
                    setTimeout(() => card.style.animation = '', 500);
                }
            } catch (error) {
                errorMsg.textContent = "Connection issue. Please verify backend state.";
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
